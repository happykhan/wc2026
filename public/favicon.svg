<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark green background -->
  <rect width="64" height="64" rx="12" fill="#166534"/>
  <!-- Football (soccer ball) icon -->
  <!-- Main circle -->
  <circle cx="32" cy="32" r="18" fill="white" stroke="#166534" stroke-width="0.5"/>
  <!-- Pentagon patches — classic football pattern -->
  <!-- Centre pentagon -->
  <polygon points="32,20 38,25 36,32 28,32 26,25" fill="#1a1a1a"/>
  <!-- Top right patch -->
  <polygon points="38,25 46,22 47,30 40,33 36,32" fill="#1a1a1a"/>
  <!-- Bottom right patch -->
  <polygon points="40,33 47,30 46,39 39,43 36,38" fill="#1a1a1a"/>
  <!-- Bottom left patch -->
  <polygon points="28,38 36,38 39,43 34,47 26,43" fill="#1a1a1a"/>
  <!-- Left patch -->
  <polygon points="17,30 26,25 28,32 24,37 17,36" fill="#1a1a1a"/>
  <!-- Top left patch -->
  <polygon points="26,17 32,20 26,25 19,22 18,15" fill="#1a1a1a"/>
</svg>
