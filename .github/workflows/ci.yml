name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The gated build — runs Vitest, then tsc, then the Vite production build.
      # A failing test or type error fails the check, just like the deploy gate.
      - name: Build (vitest + tsc + vite)
        run: npm run build
